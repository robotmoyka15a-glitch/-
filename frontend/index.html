<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:8765 http://localhost:8765; img-src 'self' data: http://127.0.0.1:8765;">
    <title>WashControl - Система управления автомойкой</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Dark Theme Palette */
        --bg-primary: #0f172a;       /* Slate 900 */
        --bg-secondary: #1e293b;     /* Slate 800 */
        --bg-tertiary: #334155;      /* Slate 700 */
        
        --text-primary: #f8fafc;     /* Slate 50 */
        --text-secondary: #94a3b8;   /* Slate 400 */
        
        --accent-primary: #3b82f6;   /* Blue 500 */
        --accent-hover: #2563eb;     /* Blue 600 */
        --accent-glow: rgba(59, 130, 246, 0.5);
        
        --success: #10b981;          /* Emerald 500 */
        --warning: #f59e0b;          /* Amber 500 */
        --danger: #ef4444;           /* Red 500 */
        
        --border-color: #334155;
        --input-bg: #1e293b;
        
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
      }
      
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; }
      body { 
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg-secondary); }
      ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #475569; }
      
      /* Selection */
      ::selection { background: var(--accent-primary); color: white; }
      
      /* Focus styles */
      :focus-visible {
        outline: 2px solid var(--accent-primary);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
